<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 知识库助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

.container { max-width: 900px; margin: 0 auto; padding: 20px; }

header { text-align: center; padding: 30px 0 20px; }
header h1 { font-size: 28px; color: #1a1a2e; }
header p { color: #666; margin-top: 6px; font-size: 14px; }

.card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h2 { font-size: 18px; margin-bottom: 16px; color: #1a1a2e; display: flex; align-items: center; gap: 8px; }

/* 上传区域 */
.upload-zone { border: 2px dashed #d0d5dd; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
.upload-zone:hover, .upload-zone.dragover { border-color: #4f46e5; background: #f8f7ff; }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
.upload-zone .hint { color: #888; font-size: 13px; margin-top: 4px; }
.upload-status { margin-top: 12px; padding: 10px 14px; border-radius: 6px; font-size: 14px; display: none; }
.upload-status.success { display: block; background: #ecfdf5; color: #065f46; }
.upload-status.error { display: block; background: #fef2f2; color: #991b1b; }
.upload-status.loading { display: block; background: #eff6ff; color: #1e40af; }

/* 查询区域 */
.query-box { display: flex; gap: 10px; }
.query-box input { flex: 1; padding: 12px 16px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
.query-box input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.query-box button { padding: 12px 24px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
.query-box button:hover { background: #4338ca; }
.query-box button:disabled { background: #a5b4fc; cursor: not-allowed; }

/* 回答区域 */
.answer-area { display: none; margin-top: 16px; }
.answer-content { background: #f8fafc; border-radius: 8px; padding: 16px; line-height: 1.7; font-size: 15px; white-space: pre-wrap; }
.answer-meta { display: flex; gap: 16px; margin-top: 10px; font-size: 13px; color: #666; }
.sources { margin-top: 12px; }
.sources summary { cursor: pointer; font-size: 14px; color: #4f46e5; font-weight: 500; }
.source-item { background: #f8fafc; border-radius: 6px; padding: 10px 12px; margin-top: 8px; font-size: 13px; line-height: 1.5; }
.source-item .src-file { color: #4f46e5; font-weight: 500; }
.source-item .src-score { color: #888; margin-left: 8px; }

/* 集合信息 */
.info-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.info-badge { background: #f0f2f5; padding: 6px 12px; border-radius: 6px; font-size: 13px; color: #555; }
.refresh-btn { background: none; border: 1px solid #d0d5dd; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #555; }
.refresh-btn:hover { background: #f8fafc; }

/* 历史记录 */
.history-item { border-bottom: 1px solid #f0f2f5; padding: 12px 0; }
.history-item:last-child { border-bottom: none; }
.history-q { font-weight: 500; color: #1a1a2e; }
.history-a { color: #555; margin-top: 4px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.no-history { color: #aaa; text-align: center; padding: 20px; font-size: 14px; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.loading { animation: pulse 1.5s infinite; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 RAG 知识库助手</h1>
    <p>上传文档，智能问答</p>
  </header>

  <!-- 文档上传 -->
  <div class="card">
    <h2>📄 文档上传</h2>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.csv,.xlsx">
      <div class="icon">📁</div>
      <div>点击或拖拽文件到此处上传</div>
      <div class="hint">支持 TXT、PDF、DOCX、CSV、XLSX</div>
    </div>
    <div class="upload-status" id="uploadStatus"></div>
  </div>

  <!-- 问答查询 -->
  <div class="card">
    <h2>🔍 智能问答</h2>
    <div class="query-box">
      <input type="text" id="queryInput" placeholder="输入你的问题..." autocomplete="off">
      <button id="queryBtn" onclick="doQuery()">提问</button>
    </div>
    <div class="answer-area" id="answerArea">
      <div class="answer-content" id="answerContent"></div>
      <div class="answer-meta" id="answerMeta"></div>
      <div class="sources" id="sourcesArea"></div>
    </div>
  </div>

  <!-- 集合信息 -->
  <div class="card">
    <h2>📊 知识库状态</h2>
    <div class="info-bar" id="infoBar">
      <span class="info-badge" id="infoText">加载中...</span>
      <button class="refresh-btn" onclick="loadInfo()">🔄 刷新</button>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="card">
    <h2>💬 问答历史</h2>
    <div id="historyList"><div class="no-history">暂无记录</div></div>
  </div>
</div>

<script>
const API = '';

// 文件上传
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const uploadStatus = document.getElementById('uploadStatus');

['dragover','dragenter'].forEach(e => uploadZone.addEventListener(e, ev => { ev.preventDefault(); uploadZone.classList.add('dragover'); }));
['dragleave','drop'].forEach(e => uploadZone.addEventListener(e, ev => { ev.preventDefault(); uploadZone.classList.remove('dragover'); }));
uploadZone.addEventListener('drop', ev => { if (ev.dataTransfer.files.length) uploadFile(ev.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files.length) uploadFile(fileInput.files[0]); });

async function uploadFile(file) {
  showUploadStatus('loading', `正在上传 ${file.name} ...`);
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(`${API}/api/vector/upload_file`, { method: 'POST', body: form });
    const data = await res.json();
    if (data.success) {
      showUploadStatus('success', `✅ ${file.name} 上传成功！`);
      loadInfo();
    } else {
      showUploadStatus('error', `❌ 上传失败: ${data.error}`);
    }
  } catch (e) {
    showUploadStatus('error', `❌ 网络错误: ${e.message}`);
  }
  fileInput.value = '';
}

function showUploadStatus(type, msg) {
  uploadStatus.className = 'upload-status ' + type;
  uploadStatus.textContent = msg;
}

// 问答
const queryInput = document.getElementById('queryInput');
const queryBtn = document.getElementById('queryBtn');
queryInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) doQuery(); });

async function doQuery() {
  const q = queryInput.value.trim();
  if (!q) return;
  queryBtn.disabled = true;
  queryBtn.textContent = '思考中...';
  document.getElementById('answerArea').style.display = 'block';
  document.getElementById('answerContent').textContent = '正在检索并生成回答...';
  document.getElementById('answerContent').classList.add('loading');
  document.getElementById('answerMeta').innerHTML = '';
  document.getElementById('sourcesArea').innerHTML = '';

  try {
    const res = await fetch(`${API}/api/vector/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, k: 5 })
    });
    const data = await res.json();
    document.getElementById('answerContent').classList.remove('loading');
    if (data.success) {
      document.getElementById('answerContent').textContent = data.answer;
      document.getElementById('answerMeta').innerHTML =
        `<span>置信度: ${(data.confidence * 100).toFixed(1)}%</span>` +
        `<span>参考来源: ${data.sources.length} 条</span>`;

      if (data.sources.length) {
        let html = '<details><summary>查看参考来源</summary>';
        data.sources.forEach((s, i) => {
          const file = s.metadata?.source || '未知';
          html += `<div class="source-item"><span class="src-file">[${i+1}] ${file}</span><span class="src-score">相似度: ${(s.score * 100).toFixed(1)}%</span><br>${s.content}</div>`;
        });
        html += '</details>';
        document.getElementById('sourcesArea').innerHTML = html;
      }
      addHistory(q, data.answer);
    } else {
      document.getElementById('answerContent').textContent = '❌ ' + (data.error || '查询失败');
    }
  } catch (e) {
    document.getElementById('answerContent').classList.remove('loading');
    document.getElementById('answerContent').textContent = '❌ 网络错误: ' + e.message;
  }
  queryBtn.disabled = false;
  queryBtn.textContent = '提问';
}

// 集合信息
async function loadInfo() {
  try {
    const res = await fetch(`${API}/api/vector/collection_info`);
    const data = await res.json();
    if (data.success && data.info) {
      const info = data.info;
      document.getElementById('infoText').textContent =
        `集合: ${info.collection_name || 'agent_rag'} | 文档数: ${info.total_documents ?? info.count ?? '未知'}`;
    } else {
      document.getElementById('infoText').textContent = '暂无数据';
    }
  } catch (e) {
    document.getElementById('infoText').textContent = '无法连接服务';
  }
}

// 历史记录
const history = [];
function addHistory(q, a) {
  history.unshift({ q, a });
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) { el.innerHTML = '<div class="no-history">暂无记录</div>'; return; }
  el.innerHTML = history.map(h =>
    `<div class="history-item"><div class="history-q">❓ ${esc(h.q)}</div><div class="history-a">${esc(h.a)}</div></div>`
  ).join('');
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// 初始化
loadInfo();
</script>
</body>
</html>
